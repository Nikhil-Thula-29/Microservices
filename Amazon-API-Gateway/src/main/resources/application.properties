spring.application.name=Amazon-API-Gateway

server.port=8888
server.servlet.context-path=/api

#Micro services routing
#Context path,port number

#Amazon-User-Service
spring.cloud.gateway.server.webmvc.routes[0].id=Amazon-User-Service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8001
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/user/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1

#Amazon-Order-Service
spring.cloud.gateway.server.webmvc.routes[1].id=Amazon-Order-Service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8002
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/order/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=1

#Amazon-Payment-Service
spring.cloud.gateway.server.webmvc.routes[2].id=Amazon-Payment-Service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8003
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/payment/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=StripPrefix=1