spring.application.name=BootMsProj03EurekaServer

#Eureka server port number
server.port=8761

#Make this project as eureka server by disabling registry and fetch operations
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false


#log file name
logging.file.name=d:/eureka_elk_log2.txt

#logger level
logging.level.com.nt=INFO
logging.level.org.springframework=OFF